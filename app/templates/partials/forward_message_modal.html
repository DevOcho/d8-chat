<div class="modal-header">
    <h5 class="modal-title">Forward Message</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form hx-post="/chat/message/{{ message.id }}/forward" hx-swap="none">
    <div class="modal-body">
        <!-- Preview of the original message -->
        <div class="quoted-reply p-2 mb-3">
            <strong>{{ message.user.display_name or message.user.username }}</strong>
            <p class="mb-0 text-muted">{{ message.content | emojize | truncate(100) }}</p>
        </div>

        <!-- Destination Select -->
        <div class="mb-3">
            <label class="form-label fw-bold">Forward to</label>
            <select name="conversation_id_str" class="form-select" required>
                <option value="" disabled selected>Select a channel or DM...</option>
                <optgroup label="Channels">
                    {% for channel in channels %}
                        <option value="channel_{{ channel.id }}"># {{ channel.name }}</option>
                    {% endfor %}
                </optgroup>
                <optgroup label="Direct Messages">
                    {% for dm in dms %}
                        <option value="{{ dm.conv_id_str }}">{{ dm.partner.display_name or dm.partner.username }}</option>
                    {% endfor %}
                </optgroup>
            </select>
        </div>

        <!-- Optional Note -->
        <div class="mb-3">
            <label class="form-label fw-bold">Add a note (optional)</label>
            <textarea name="optional_note" class="form-control" rows="2" placeholder="e.g. FYI, check this out!"></textarea>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Forward</button>
    </div>
</form>
