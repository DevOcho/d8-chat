{% extends "base.html" %}
{% block content %}
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h1 class="card-title h3 mb-3">Set a new password</h1>
                    {% if error %}<div class="alert alert-danger" role="alert">{{ error }}</div>{% endif %}
                    {% if token %}
                        <p class="text-muted">Choose a new password. Use at least 12 characters.</p>
                        <form action="{{ url_for('auth.reset_password', token=token) }}"
                              method="POST">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <div class="mb-3">
                                <label for="password" class="form-label">New password</label>
                                <input type="password"
                                       class="form-control"
                                       id="password"
                                       name="password"
                                       autocomplete="new-password"
                                       minlength="12"
                                       required>
                            </div>
                            <div class="mb-3">
                                <label for="password_confirm" class="form-label">Confirm new password</label>
                                <input type="password"
                                       class="form-control"
                                       id="password_confirm"
                                       name="password_confirm"
                                       autocomplete="new-password"
                                       minlength="12"
                                       required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Update password</button>
                        </form>
                    {% else %}
                        <p>
                            <a href="{{ url_for('auth.forgot_password_form') }}"
                               class="btn btn-primary">Request a new reset link</a>
                        </p>
                    {% endif %}
                    <p class="text-center mt-3 mb-0">
                        <a href="{{ url_for('auth.index') }}">Back to login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
