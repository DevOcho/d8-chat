# nginx/nginx.conf

# Define an "upstream" for our Gunicorn application server
upstream app {
    server app:5001;
}

# Restrict the values we accept on the Connection upgrade hop. Only legitimate
# WebSocket upgrades pass through; an attacker cannot request `Upgrade: h2c`
# (or any other protocol) and have it forwarded to the backend, which closes
# off the H2C smuggling class of attack against the reverse proxy.
map $http_upgrade $connection_upgrade {
    default     "";
    websocket   "Upgrade";
}

# Server block to handle HTTP requests and redirect them to HTTPS
server {
    listen 80;
    server_name ${D8CHAT_HOSTNAME}; # This variable will be replaced by Docker

    # Allow large uploads
    client_max_body_size 50M;

    # Location for handling Let's Encrypt's ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Use $server_name (the hostname configured above) rather than $host to
    # build the redirect target so an attacker can't poison the Location with
    # a forged Host header.
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Server block to handle HTTPS requests
server {
    listen 443 ssl;
    server_name ${D8CHAT_HOSTNAME};

    # Pin to modern TLS only — older versions (TLS 1.0/1.1) have known weaknesses.
    ssl_protocols TLSv1.2 TLSv1.3;

    # Paths to the SSL certificate and key
    ssl_certificate /etc/letsencrypt/live/${D8CHAT_HOSTNAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${D8CHAT_HOSTNAME}/privkey.pem;

    # Allow large uploads
    client_max_body_size 50M;

    # Include recommended TLS parameters for security
    include /etc/nginx/conf.d/options-ssl-nginx.conf;
    ssl_dhparam /etc/nginx/conf.d/ssl-dhparams.pem;

    # Location for handling WebSocket connections
    location /ws/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $server_name;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Location for serving static files directly
    location /static/ {
        alias /app/app/static/;
        expires 1d;
    }

    # Location for all other application requests
    location / {
        proxy_pass http://app;
        proxy_set_header Host $server_name;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }
}
